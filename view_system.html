<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100vw;
            height: 100vh;
            gap: 2px;
            background: #111;
        }
        .viewport { position: relative; background: #000; overflow: hidden; }
        .label {
            position: absolute; top: 8px; left: 8px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 4px 10px; pointer-events: none;
            z-index: 10; font-size: 11px; border-radius: 4px;
        }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .bar-container { width: 200px; height: 4px; background: #222; margin: 10px; border-radius: 2px; }
        #loading-bar { width: 0%; height: 100%; background: #fff; border-radius: 2px; }
        #pointer-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); z-index: 50; font-size: 13px;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div id="loading-text">Loading...</div>
        <div class="bar-container"><div id="loading-bar"></div></div>
    </div>
    <div id="container">
        <div class="viewport" id="v1"><div class="label">1st Person</div></div>
        <div class="viewport" id="v2"><div class="label">2nd Person</div></div>
        <div class="viewport" id="v3"><div class="label">3rd Person</div></div>
        <div class="viewport" id="v4"><div class="label">Bird's Eye</div></div>
    </div>
    <div id="pointer-hint">Click to look around | WASD move | Space jump</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="view_system.js?v=1"></script>
</body>
</html>
